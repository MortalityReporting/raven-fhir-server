version: '3.8'

services:
  fhir_fhirbase:
    image: gtri/mdi-fhirbase:latest
    container_name: fhir_fhirbase
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cmsr4
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mynewpassword
    networks:
      - raven-network
    volumes:
      - fhir_fhirbase_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  raven-fhir-server:
    image: gtri/mdi-fhir-server:latest
    container_name: raven-fhir-server
    ports:
      - "8080:8080"
    environment:
      - JDBC_URL=jdbc:postgresql://fhir_fhirbase:5432/cmsr4
      - JDBC_USERNAME=postgres
      - JDBC_PASSWORD=mynewpassword
      - JDBC_POOLSIZE=5
      - SMART_INTROSPECTURL=
      - SMART_AUTHSERVERURL=
      - SMART_TOKENSERVERURL=
      - AUTH_BASIC=client:secret
      - FHIR_READONLY=False
      - SERVERBASE_URL=http://localhost:8080/mdi-fhir-server/fhir
      - INTERNAL_FHIR_REQUEST_URL=http://localhost:8080/mdi-fhir-server/fhir
      - SERVER_VERSION=v2026-03-27.3.0.0-draft
      - SERVER_TYPE=raven
      - AUTH_AUDIENCE=https://bluejay.heat.icl.gtri.org/mdi-fhir-server/fhir
      - AUTH_ISSUER_URL=raven-mortality.us.auth0.com
    networks:
      - raven-network
    depends_on:
      fhir_fhirbase:
        condition: service_healthy

networks:
  raven-network:
    driver: bridge

volumes:
  fhir_fhirbase_data:
