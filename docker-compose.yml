version: '3.8'

services:
  fhir_db:
    image: postgres:15-alpine
    container_name: fhir_db
    environment:
      POSTGRES_DB: fhirbase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fhir_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  raven-fhir-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raven-fhir-server
    ports:
      - "8080:8080"
    environment:
      - JDBC_URL=jdbc:postgresql://fhir_db:5432/fhirbase
      - JDBC_USERNAME=postgres
      - JDBC_PASSWORD=postgres
      - JDBC_POOLSIZE=5
      - SMART_INTROSPECTURL=
      - SMART_AUTHSERVERURL=
      - SMART_TOKENSERVERURL=
      - AUTH_BASIC=client:secret
      - FHIR_READONLY=False
      - SERVERBASE_URL=http://localhost:8080/mdi-fhir-server/fhir
      - INTERNAL_FHIR_REQUEST_URL=http://localhost:8080/mdi-fhir-server/fhir
      - SERVER_VERSION=v2026-03-27.3.0.0-draft
      - SERVER_TYPE=raven
      - AUTH_AUDIENCE=https://bluejay.heat.icl.gtri.org/mdi-fhir-server/fhir
      - AUTH_ISSUER_URL=raven-mortality.us.auth0.com
    depends_on:
      fhir_db:
        condition: service_healthy

volumes:
  fhir_db_data: